issue_templates:
  Feature Delivery:
    - Ship {service} workflow milestone
    - Improve {service} user journey
    - Launch {domain} capability slice
  Operational / Support:
    - Support escalation for {service}
    - Triage production queue for {domain}
    - Runbook update after {service} alert
  Maintenance / Tech Debt:
    - Refactor {service} boundary
    - Retire legacy path in {domain}
    - Dependency cleanup for {service}
  Quality / Reliability:
    - Stabilize {service} failure mode
    - Add regression coverage for {domain}
    - Reduce retry noise in {service}
  Risk / Security:
    - Harden {service} access controls
    - Remediate audit finding in {domain}
    - Rotate sensitive integration path for {service}

